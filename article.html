    body: `<p>2023年12月8日，美国食品药品监督管理局（FDA）正式批准了Casgevy（通用名：exagamglogene autotemcel，简称exa-cel），这是人类历史上第一款获得监管机构批准的CRISPR基因编辑疗法。Casgevy由Vertex制药与CRISPR Therapeutics联合研发，适应症为镰刀型细胞贫血症（SCD）以及输血依赖性β地中海贫血（TDT），这两种遗传性血液病此前只能通过骨髓移植进行治疗，且骨髓配型的高度匹配要求使大多数患者无缘此路。</p>
    <div class="pq"><p>"今天是CRISPR基因编辑技术历经十年实验室研究后，正式走入临床现实的历史性时刻。"</p><cite>— CRISPR Therapeutics联合创始人 Emmanuelle Charpentier（2020年诺贝尔化学奖得主）</cite></div>
    <p>Casgevy的作用机制相当精妙：它通过CRISPR-Cas9系统编辑患者自身造血干细胞中的BCL11A基因，关闭其对胎儿血红蛋白（HbF）的抑制，从而重新激活HbF的表达。胎儿血红蛋白在功能上可以补偿患者因基因缺陷而无法正常合成的成人血红蛋白，使红细胞恢复携氧能力。在关键临床试验中，29名接受治疗的镰刀型细胞贫血症患者中，有28名在至少一年的随访期内完全消除了血管闭塞性疼痛危机。这是一项接近"功能性治愈"的临床结果。</p>
    <p>在Casgevy之后，基因编辑领域的下一个技术前沿是David Liu实验室（哈佛/布罗德研究所）开发的Prime Editing技术。与传统CRISPR-Cas9相比，Prime Editing无需制造双链DNA断裂，可以对基因组进行更精确的"搜索并替换"式编辑，理论上能够修正人类已知的约89%的致病性点突变。最新研究数据显示，Prime Editing的脱靶编辑率已降至百万分之一以下，进一步为其进入临床提供了安全性保障。基因编辑治疗的新纪元，已经正式开始。</p>`,
    related: ['alphafold','gpt6','fusion']
  },

  'fusion': {

    body: `<p>2022年12月5日，位于美国加利福尼亚州利弗莫尔的国家点火设施（NIF）实现了人类历史上第一次聚变净能量增益：向靶丸输送的激光能量为2.05兆焦，而聚变反应释放的能量达到3.15兆焦，增益比约为1.54倍。尽管这一数字相比商业化所需的能量增益仍相距甚远（工程师通常需要数十至数百倍的增益才具备商业意义），但物理学意义上的"点火"（ignition）被证明是可能的，这打破了困扰聚变研究数十年的最核心疑问。</p>
    <div class="pq"><p>"今天，我们第一次在实验室中点燃了一颗微型恒星。这是科学的历史性时刻。"</p><cite>— 美国能源部部长 Jennifer Granholm，于NIF点火成功宣布会上发言</cite></div>
    <p>与此同时，私营聚变企业的技术进展同样引人瞩目。Commonwealth Fusion Systems（CFS）由MIT核科学与工程系教授Dennis Whyte创立，该公司于2021年9月成功演示了其自主研发的20特斯拉高温超导（HTS）磁铁，这是同类设备中磁场强度的世界纪录。更强的磁场意味着可以用更小的装置约束更高密度的等离子体，CFS据此设计的紧凑型托卡马克SPARC，其体积仅为国际热核实验堆（ITER）的约1/65，但预计能实现两倍以上的能量增益。CFS已获得超过18亿美元融资，并已为其商业聚变电厂ARC启动厂址选择程序。</p>

    body: `<p>2019年10月，谷歌在《Nature》杂志发表论文，宣称其53量子比特的Sycamore处理器在约200秒内完成了一项特定的随机电路采样任务，而当时最强大的经典超级计算机需要约1万年才能完成同样任务。这一宣告被冠以"量子优越性"（Quantum Supremacy）的名号，震动了全球科技界。然而，IBM研究团队随即发文反驳，指出通过优化算法，经典超算实际上可以在2.5天内完成同一任务——"量子优越性"的边界，远比谷歌宣称的更加模糊。</p>
    <div class="pq"><p>"量子优越性不是一个开关，而是一条逐渐移动的边界线。真正的问题是：什么时候量子系统能解决经典系统永远解决不了的实际问题？"</p><cite>— IBM量子计算总裁 Jay Gambetta</cite></div>
    <p>在中国方面，中国科学技术大学潘建伟团队于2020年发表了光子量子计算系统"九章"的研究成果：这台系统在高斯玻色采样（Gaussian Boson Sampling）任务上的运算速度，比当时最快的经典超算快约100万亿倍。2021年，九章2.0将光子数提升至113个，同年，超导路线的"祖冲之2.0"（66量子比特）在随机线路采样任务上声称相较谷歌Sycamore的百万倍优越性。九章3.0（2023年）进一步将光子数提升至255个，在玻色采样任务速度上再创纪录。</p>

    body: `<p>2023年8月29日，华为在没有任何预告的情况下悄然上架了Mate 60 Pro智能手机。这款手机最初并未引起特别关注，直到科技分析机构TechInsights对其拆机分析后发现：Mate 60 Pro搭载的麒麟9000S处理器，由中芯国际（SMIC）采用其N+2工艺节点制造，芯片密度相当于7nm等效制程。这一发现在半导体产业界和地缘政治分析圈引发了轩然大波——因为美国政府此前的出口管制逻辑，正是建立在"封锁先进制程设备可有效阻止中国芯片进步"的假设之上。</p>

    <p>与此同时，中国存储芯片领域也在悄然崛起。长江存储（YMTC）于2022至2023年间推出了232层3D NAND闪存，其技术水准已进入全球第一梯队，并被苹果短暂考虑用于iPhone（后因美国政府施压放弃）。长鑫存储（CXMT）的DDR5内存芯片也在2024年开始规模出货。然而，分析人士普遍指出，在无法获得EUV光刻机的情况下，中国芯片产业在5nm以下制程节点的突破将面临极大物理工程障碍，这一瓶颈短期内难以通过工艺创新完全规避。</p>`,

  'alphafold': {
    title: 'AlphaFold 3发布：预测范围从蛋白质扩展至DNA、RNA与小分子，诺贝尔奖桂冠随即颁出',
    subtitle: 'Google DeepMind于2024年5月在《Nature》发表AlphaFold 3，将结构预测能力扩展至所有生物分子；同年诺贝尔化学奖授予蛋白质结构预测领域。',

    hero: { type:'grad', bg:'linear-gradient(135deg,#14532d,#0a1a0a)', letter:'🔬' },

      'Isomorphic Labs（Google旗下）利用AlphaFold 3加速药物靶点发现，多个项目已进入临床'
    ],
    body: `<p>2024年5月8日，Google DeepMind在《Nature》杂志发表了AlphaFold 3，这是继2020年AlphaFold 2解决蛋白质折叠问题之后，生物信息学领域最重要的一次技术飞跃。AlphaFold 3的核心突破在于：其预测能力不再局限于单一蛋白质的三维结构，而是扩展至蛋白质与DNA、RNA、小分子配体（即潜在药物分子）之间的相互作用结构。这一能力的提升，对于药物研发领域具有革命性意义——理解蛋白质如何与药物分子结合，是新药设计的核心问题之一。</p>
    <div class="pq"><p>"AlphaFold改变了生物学的研究方式。在它出现之前，解析一个蛋白质结构可能需要数年；现在，所有已知蛋白质的结构都可以在几秒内预测。"</p><cite>— 诺贝尔化学奖委员会颁奖词（2024年）</cite></div>
    <p>AlphaFold 3的技术架构较前代发生了根本性变化：其核心采用扩散模型（Diffusion Model）而非前代的Evoformer架构，能够对不同类型生物分子的原子坐标进行联合预测。在蛋白质-配体相互作用的预测精度上，AlphaFold 3比现有最优方法提升约50%，在蛋白质-核酸复合物的结构预测上同样表现突出。2024年10月，瑞典皇家科学院将诺贝尔化学奖授予DeepMind的Demis Hassabis与John Jumper，以及华盛顿大学的David Baker——后者因利用AI进行蛋白质从头设计（de novo design）而同获此奖。</p>
    <p>在产业应用层面，Google旗下的Isomorphic Labs正在利用AlphaFold 3与自研模型加速多个药物发现项目，据报道已有靶向癌症与神经退行性疾病的候选化合物进入早期临床阶段。然而，学术界对DeepMind在开放性方面的限制提出了批评：AlphaFold 3虽提供在线服务器供研究人员使用，但其模型权重与完整代码并未像AlphaFold 2那样完全开放，引发了关于商业利益与开放科学之间张力的讨论。</p>`,

    body: `<p>如果说2018年是中美科技冷战的"元年"，那么导火索是一家名为中兴通讯（ZTE）的中国电信设备商。2018年4月，美国商务部以中兴违反制裁伊朗和朝鲜的协议为由，宣布对其实施7年出口禁令，禁止美国企业向中兴出售芯片、软件及技术服务。中兴约25%—30%的核心芯片来自美国供应商（高通、德州仪器、英特尔），这一断供几乎令其立即停摆。这次事件第一次向全球展示了"芯片断供"作为地缘政治武器的实际效果。</p>
    <div class="pq"><p>"华为案件从根本上改变了全球科技公司对供应链风险的认知。没有哪家依赖美国技术的公司可以声称自己对政治风险免疫。"</p><cite>— 半导体行业分析师，路透社，2021年</cite></div>

    body: `<p>"硅盾"（Silicon Shield）这一概念最初由科技作家克雷格·艾迪生（Craig Addison）于2001年提出，其核心论点是：台湾对全球半导体供应链的不可替代性，将使任何意图对台湾采取军事行动的大国三思而后行——因为冲突将导致全球芯片供应链中断，损害的不仅仅是台湾，也包括攻击方本身。20年后，这一理论因台积电的崛起而获得了更为实质的支撑。</p>

  'geo-pqc-migration': {
    title: 'NIST后量子密码标准正式发布：CRYSTALS-Kyber成为全球加密基础设施升级核心',
    subtitle: '2024年8月，NIST正式发布三项后量子密码学联邦信息处理标准，终结长达8年的全球标准化竞赛。谁已准备好，谁还在拖延？',
    category: '地缘政治', catPage: 'geopolitics.html', catNav: 1,

    hero: { type:'grad', bg:'linear-gradient(135deg,#7c3aed,#2e1065)', letter:'PQC' },
    tags: ['后量子密码','NIST','CRYSTALS-Kyber','ML-KEM','标准化','网络安全'],
    keyPoints: [

    body: `<p>2024年8月13日，美国国家标准与技术研究院（NIST）正式发布了后量子密码学领域的三项联邦信息处理标准（FIPS），标志着这场历时8年、共有来自全球25个国家69支团队参与的密码学马拉松终于画上句点。三项标准分别是：FIPS 203（ML-KEM，基于CRYSTALS-Kyber算法，用于密钥封装机制）、FIPS 204（ML-DSA，基于CRYSTALS-Dilithium，用于数字签名）和FIPS 205（SLH-DSA，基于SPHINCS+，作为数字签名备选方案）。</p>
    <div class="pq"><p>"这是密码学历史上一次真正的范式转换。我们不是在打补丁，我们是在为整个互联网的安全基础换地基。"</p><cite>— NIST计算机安全部门主任 Lily Chen</cite></div>
    <p>三项标准的核心技术来源——格密码学（Lattice-based Cryptography）——之所以被认为能够抵抗量子计算攻击，是因为其安全性依赖于"最短向量问题"（SVP）和"学习带误差问题"（LWE）的计算难度，而目前已知的量子算法（包括Shor算法）对这类问题并不具备指数级加速优势。这与RSA和ECC所依赖的大整数分解和离散对数问题截然不同——后两者可被Shor算法在多项式时间内破解。</p>
    <p>在实际部署进展方面，各行业差异显著。科技巨头行动最为迅速：Google于2023年在Chrome浏览器中为TLS 1.3握手引入了CRYSTALS-Kyber与X25519的混合密钥交换方案；Apple在iOS 17.4及macOS 14.4中为iMessage引入了后量子加密层（PQ3协议）；Signal Messenger亦于2024年完成协议升级。金融与医疗行业则进度明显滞后——Ponemon Institute 2024年调查显示，全球企业平均后量子迁移准备度评分仅为39%，金融服务与医疗行业由于大量依赖遗留系统（Legacy Systems），实际迁移工作量可能比科技公司高出5至10倍。</p>`,

/* ── RENDER ──────────────────────────────────────────────────────────────── */
const NAV_LABELS = ['科技','地缘政治','量子计算','人工智能','网络安全','市场'];
const NAV_PAGES  = ['keji.html','geopolitics.html','quantum.html','ai.html','security.html','markets.html'];

function getParam(k){ return new URLSearchParams(location.search).get(k); }

function heroHTML(){ return ''; }

function relCard(id){
  const a = DB[id]; if(!a) return '';
  return `<a class="rel-card" href="article.html?id=${id}">
    <div class="rel-body">
      <div class="rl">${a.category}</div>
      <h3>${a.title}</h3>
      <div class="rm">${a.date} · ${a.readTime}分钟阅读</div>
    </div></a>`;
}

function render(){
  const id = getParam('id');
  const a  = DB[id];
  const root = document.getElementById('article-root');
  const relRoot = document.getElementById('related-root');

  if(!a){
    root.innerHTML = `<div class="not-found"><h2>404 — 文章未找到</h2><p>该页面不存在或已被移除。</p><a href="index.html">返回首页</a></div>`;
    return;
  }

  /* page title */
  document.getElementById('page-title').textContent = a.title + ' — QuanTimes';

  /* breadcrumb */
  document.getElementById('bc-cat').textContent = a.category;
  document.getElementById('bc-cat').href = a.catPage;
  document.getElementById('bc-title').textContent = a.title;

  /* highlight nav */
  const navLinks = document.querySelectorAll('#main-nav a');
  if(navLinks[a.catNav]) navLinks[a.catNav].classList.add('active');

  /* key points */
  const kpHTML = a.keyPoints ? `<div class="kp-box"><h4>核心要点</h4><ul>${a.keyPoints.map(p=>`<li>${p}</li>`).join('')}</ul></div>` : '';

  /* tags */
  const tagsHTML = `<div class="tags">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;

  /* share */
  const shareHTML = `<div class="share-row">
    <button class="sbtn tw" onclick="window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(document.title)+'&url='+encodeURIComponent(location.href),'_blank','width=600,height=400')">𝕏 分享</button>
    <button class="sbtn li" onclick="window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(location.href),'_blank','width=600,height=400')">LinkedIn</button>
    <button class="sbtn cp" onclick="navigator.clipboard.writeText(location.href)">🔗 复制链接</button>
  </div>`;

  root.innerHTML = `<div class="art-wrap">
    <span class="sec-label">${a.category}</span>
    <h1 class="art-title">${a.title}</h1>
    <p class="art-sub">${a.subtitle}</p>
    <div class="art-meta">
      <span class="au">${a.author} · ${a.role}</span>
      <span>·</span><span>${a.date}</span>
      <span>·</span><span>阅读约 ${a.readTime} 分钟</span>
    </div>
    ${shareHTML}
    ${heroHTML(a)}
    ${kpHTML}
    <div class="body-copy">${a.body}</div>
    ${tagsHTML}
  </div>`;

  /* related */
  if(a.related && a.related.length){
    relRoot.innerHTML = `<div class="rel-section">
      <div style="border-top:2px solid #e5e7eb;padding-top:36px;margin-top:0;">
        <div class="rel-hdr">相关报道</div>
        <div class="rel-grid">${a.related.map(relCard).join('')}</div>
      </div>
    </div>`;
  }
}

/* reading progress */
window.addEventListener('scroll',()=>{
  const d=document.documentElement;
  document.getElementById('prog').style.width=Math.min(d.scrollTop/(d.scrollHeight-d.clientHeight)*100,100)+'%';
});

/* live date */
document.getElementById('live-date').textContent=new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'long',day:'numeric'}).format(new Date());

render();
